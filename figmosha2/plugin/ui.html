<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 12px; font-size: 13px; color: #222; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  #status { padding: 3px 8px; border-radius: 10px; font-family: monospace; font-size: 11px; }
  .ok { background: #d4f4dd; color: #0a7d2f; }
  .err { background: #ffe0e0; color: #b00020; }
  .pending { background: #fff3cd; color: #856404; }
  #log { background: #f5f5f5; padding: 8px; border-radius: 4px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 11px; white-space: pre-wrap; margin: 0; }
  .muted { color: #777; font-size: 11px; }
</style>
</head>
<body>
  <div class="row">
    <span>bridge:</span>
    <span id="status" class="pending">connecting…</span>
    <span class="muted" id="server">ws://localhost:8787/plugin</span>
  </div>
  <pre id="log">[ui] booting</pre>

<script>
const SERVER = "ws://localhost:8787/plugin";
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");
let ws = null;
let reconnectTimer = null;
const recentLog = [];

function log(line) {
  const ts = new Date().toTimeString().slice(0, 8);
  recentLog.push(`[${ts}] ${line}`);
  if (recentLog.length > 80) recentLog.shift();
  logEl.textContent = recentLog.join("\n");
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls;
}

function shortId(id) {
  return id ? String(id).slice(0, 8) : "?";
}

function connect() {
  clearTimeout(reconnectTimer);
  setStatus("connecting…", "pending");
  try {
    ws = new WebSocket(SERVER);
  } catch (e) {
    log("[ws] new WebSocket failed: " + e.message);
    reconnectTimer = setTimeout(connect, 2000);
    return;
  }

  ws.onopen = () => {
    setStatus("connected", "ok");
    log("[ws] connected");
    try { ws.send(JSON.stringify({ type: "hello", version: "2.0" })); } catch (e) {}
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch (err) {
      log("[ws] bad message: " + err.message);
      return;
    }
    if (msg.type === "exec") {
      log(`[exec] ${shortId(msg.id)} code=${(msg.code || "").length}b`);
      parent.postMessage({ pluginMessage: { type: "exec", id: msg.id, code: msg.code } }, "*");
    } else if (msg.type === "ping") {
      try { ws.send(JSON.stringify({ type: "pong" })); } catch (e) {}
    }
  };

  ws.onerror = () => {
    setStatus("error", "err");
    log("[ws] error");
  };

  ws.onclose = () => {
    setStatus("disconnected, retrying…", "err");
    log("[ws] disconnected");
    reconnectTimer = setTimeout(connect, 2000);
  };
}

window.onmessage = (e) => {
  const m = e.data && e.data.pluginMessage;
  if (!m) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    log(`[drop] ws not open, ${m.type} id=${shortId(m.id)}`);
    return;
  }
  try { ws.send(JSON.stringify(m)); } catch (err) {
    log("[send] failed: " + err.message);
    return;
  }
  if (m.type === "result") log(`[ok]  ${shortId(m.id)}`);
  else if (m.type === "error") log(`[err] ${shortId(m.id)} ${m.text}`);
  else if (m.type === "log") {/* skip — would spam */}
};

connect();
</script>
</body>
</html>
