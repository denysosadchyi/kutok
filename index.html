<title>Куток — Проєкт</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }

  :root {
    --paper:     oklch(97.5% 0.006 75);
    --panel:     oklch(96.2% 0.007 75);
    --ink:       oklch(25% 0.012 60);
    --muted:     oklch(48% 0.015 65);
    --faint:     oklch(62% 0.014 68);
    --line:      oklch(90% 0.008 75);
    --line-soft: oklch(93% 0.007 75);
    --clay:      oklch(52% 0.115 40);
    --clay-soft: oklch(94% 0.022 50);
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --nav-w: 272px;
  }

  html, body { height: 100%; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--paper);
    display: flex;
    overflow: hidden;
  }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  :focus-visible { outline: 2px solid var(--clay); outline-offset: 1px; border-radius: 3px; }
  ::selection { background: var(--clay-soft); }

  /* ── Ліва панель ── */
  nav {
    flex: none; width: var(--nav-w); height: 100dvh;
    overflow-y: auto; overscroll-behavior: contain;
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 0 18px 64px;
    scroll-padding-top: 68px; /* активний пункт не пірнає під липкий фільтр */
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }

  .brand { display: block; padding-top: 22px; font-weight: 800; font-size: 15.5px; letter-spacing: -.01em; }
  .brand span {
    display: block; font-family: var(--mono); font-size: 9px; font-weight: 400;
    color: var(--muted); letter-spacing: .16em; margin-top: 4px;
  }

  /* фільтр липне до верху панелі при скролі дерева */
  .fwrap {
    position: sticky; top: 0; z-index: 2;
    margin: 14px -18px 0; padding: 10px 18px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--line-soft);
  }
  .filter {
    width: 100%; padding: 7px 10px;
    font: inherit; font-size: 12px;
    border: 1px solid var(--line); border-radius: 7px;
    background: var(--paper); color: var(--ink);
    transition: border-color .15s ease;
  }
  .filter:hover { border-color: oklch(84% 0.01 70); }
  .filter:focus { outline: none; border-color: var(--clay); }
  .filter::placeholder { color: var(--faint); }

  /* шеврон-індикатор згортання — спільний для всіх рівнів */
  .chev { flex: none; width: 12px; height: 12px; color: var(--faint); }
  .chev path { stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  [aria-expanded] .chev { transform: rotate(0); }
  [aria-expanded="false"] .chev { transform: rotate(-90deg); }
  @media (prefers-reduced-motion: no-preference) {
    .chev { transition: transform .2s cubic-bezier(.22, 1, .36, 1); }
    .pg, .st, .tag, .secs a, .cap-btn, .role-btn, .tw, .all-btn { transition: color .15s ease, background .15s ease; }
  }

  /* ── Розділ (cap) ── */
  .cap { margin-top: 28px; }
  .cap-head { display: flex; align-items: center; gap: 6px; }
  .cap-btn {
    flex: 1 1 auto; display: flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 9.5px; font-weight: 600;
    letter-spacing: .13em; text-transform: uppercase; color: var(--muted);
    padding: 4px 6px; margin-left: -6px; border-radius: 6px; text-align: left;
  }
  .cap-btn:hover { color: var(--ink); background: var(--line-soft); }
  .all-btn {
    flex: none; font-family: var(--mono); font-size: 8.5px; color: var(--faint);
    text-transform: uppercase; letter-spacing: .08em;
    padding: 3px 6px; border-radius: 5px;
  }
  .all-btn:hover { color: var(--clay); background: var(--clay-soft); }
  .cap-body { margin-top: 6px; }
  .cap-body[hidden] { display: none; }
  /* текст сторінок 1-го рівня вирівняний із текстом заголовка розділу (x = 19) */
  .cap-body > .pg { margin-left: 11px; }

  /* ── Рядок сторінки (ресерч, огляди) ── */
  .pg {
    display: flex; align-items: baseline; gap: 6px;
    font-size: 12.5px; font-weight: 600; color: var(--ink);
    padding: 4px 8px; border-radius: 6px; line-height: 1.4;
  }
  .pg:hover { background: var(--line-soft); }
  .pg.active { color: var(--clay); background: var(--clay-soft); }

  /* секції активної research-сторінки: направляюча під початком тексту сторінки */
  .secs {
    display: flex; flex-direction: column; gap: 1px;
    margin: 2px 0 8px 19px; padding-left: 9px;
    border-left: 1px solid var(--line);
  }
  .secs a {
    font-size: 11.5px; font-weight: 500; color: var(--muted);
    padding: 2.5px 7px; border-radius: 5px; line-height: 1.4;
  }
  .secs a:hover { color: var(--ink); background: var(--line-soft); }
  .secs a.active { color: var(--clay); background: var(--clay-soft); }
  .secs .n { font-family: var(--mono); font-size: 9px; margin-right: 6px; opacity: .55; }

  /* ── Група ролі ── */
  .role { margin-top: 12px; }
  .role-btn {
    width: 100%; display: flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; color: var(--muted);
    padding: 5px 6px; margin-left: -6px; border-radius: 6px; text-align: left;
  }
  .role-btn:hover { color: var(--ink); background: var(--line-soft); }
  .role-btn .cnt {
    margin-left: auto; font-family: var(--mono); font-size: 9px;
    font-weight: 400; color: var(--faint); letter-spacing: 0;
  }
  .role-body { margin: 1px 0 2px; }
  .role-body[hidden] { display: none; }

  /* ── Екран: шеврон + назва + job-тег ── */
  .screen { margin: 0; }
  .scr-row { display: flex; align-items: flex-start; }
  .tw {
    flex: none; display: grid; place-items: center;
    width: 20px; height: 24px; border-radius: 5px; color: var(--faint);
  }
  .tw:hover { color: var(--clay); background: var(--clay-soft); }
  .tw.void { visibility: hidden; }
  .scr-row .pg { flex: 1 1 auto; min-width: 0; font-size: 12px; padding: 3.5px 7px; }
  .tag {
    flex: none; align-self: center;
    font-family: var(--mono); font-size: 8.5px; letter-spacing: .06em;
    text-transform: uppercase; color: var(--faint);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 1px 5px; margin-left: 4px;
  }
  .tag:hover { color: var(--clay); border-color: var(--clay-soft); background: var(--clay-soft); }

  /* стани екрана — повними словами, з направляючою */
  .states {
    display: flex; flex-direction: column; gap: 1px;
    margin: 1px 0 4px 29px; padding-left: 10px;
    border-left: 1px solid var(--line);
  }
  .states[hidden] { display: none; }
  .st {
    display: block; font-size: 11.5px; font-weight: 500; color: var(--muted);
    padding: 2.5px 7px; border-radius: 5px; line-height: 1.4;
  }
  .st:hover { color: var(--ink); background: var(--line-soft); }
  .st.active { color: var(--clay); background: var(--clay-soft); font-weight: 600; }

  .nomatch {
    display: none; margin-top: 18px; font-size: 12px; color: var(--muted);
    padding: 0 6px; line-height: 1.5;
  }

  /* ── В'юер ── */
  main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; height: 100dvh; }
  .bar {
    flex: none; display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  .bar .path { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar a.open {
    margin-left: auto; flex: none; color: var(--clay); font-weight: 600;
    padding: 3px 8px; border-radius: 6px;
  }
  .bar a.open:hover { background: var(--clay-soft); }
  iframe {
    flex: 1 1 auto; width: 100%; border: 0; background: var(--paper);
    opacity: 0;
  }
  iframe.ready { opacity: 1; transition: opacity .12s ease; }

  /* мобільний фолбек: панель зверху, згорнута */
  @media (max-width: 760px) {
    body { flex-direction: column; overflow: auto; }
    nav { width: 100%; height: auto; max-height: 45dvh; border-right: 0; border-bottom: 1px solid var(--line); }
    main { height: 55dvh; }
  }
</style>

const HOME = 'research/index.html';

const openEl = document.getElementById('open');

// ── стан згортання: localStorage + дефолти ──
const STORE_KEY = 'kutok-shell-nav';
let stored = {};
try { stored = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (_) {}
const collapsibles = new Map(); // id → { btn, body, def }
const openState = {};           // намір користувача; фільтр і автопоказ його не чіпають

function saveStore() {
  const out = {};
  for (const [id, c] of collapsibles)
    if (openState[id] !== c.def) out[id] = openState[id];
  try { localStorage.setItem(STORE_KEY, JSON.stringify(out)); } catch (_) {}
}

// лише вигляд (DOM); намір лишається в openState
function applyOpen(id, open) {
  const c = collapsibles.get(id);
  if (!c) return;
  c.btn.setAttribute('aria-expanded', String(open));
  c.body.hidden = !open;
}

function setOpen(id, open) {
  if (!collapsibles.has(id)) return;
  applyOpen(id, open);
  openState[id] = open;
  saveStore();
}

function isOpen(id) { return !!openState[id]; }

const CHEV = '<svg class="chev" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 6l4 4 4-4"/></svg>';

function makeCollapsible(id, btn, body) {
  const def = !(id.startsWith('screen:')); // екрани типово згорнуті, решта — розгорнуті
  const open = id in stored ? stored[id] : def;
  btn.setAttribute('aria-expanded', String(open));
  btn.setAttribute('aria-controls', 'c-' + id.replace(/[^a-z0-9]+/gi, '-'));
  body.id = 'c-' + id.replace(/[^a-z0-9]+/gi, '-');
  body.hidden = !open;
  collapsibles.set(id, { btn, body, def });
  openState[id] = open;
  btn.addEventListener('click', () => setOpen(id, btn.getAttribute('aria-expanded') !== 'true'));
}

frag.appendChild(brand);

const filterEl = document.createElement('input');
filterEl.className = 'filter';
filterEl.type = 'search';
filterEl.placeholder = 'Фільтр сторінок…  ( / )';
filterEl.setAttribute('aria-label', 'Фільтр сторінок');
frag.appendChild(filterEl);

function capSection(id, title, withAll) {
  const cap = document.createElement('section');
  cap.className = 'cap';
  const head = document.createElement('div');
  head.className = 'cap-head';
  const btn = document.createElement('button');
  btn.className = 'cap-btn';
  btn.type = 'button';
  btn.innerHTML = CHEV + title;
  head.appendChild(btn);
  if (withAll) {
    const all = document.createElement('button');
    all.className = 'all-btn';
    all.type = 'button';
    all.textContent = 'згорнути все';
    all.addEventListener('click', () => {
      const anyClosed = [...collapsibles.keys()]
        .some(k => (k.startsWith('role:') || k.startsWith('screen:')) && !isOpen(k));
      for (const k of collapsibles.keys())
        if (k.startsWith('role:') || k.startsWith('screen:')) {
          applyOpen(k, anyClosed);
          openState[k] = anyClosed;
        }
      if (anyClosed) { applyOpen(id, true); openState[id] = true; }
      saveStore();
      syncAllBtn();
    });
    head.appendChild(all);
    cap.__allBtn = all;
  }
  const body = document.createElement('div');
  body.className = 'cap-body';
  cap.appendChild(head);
  cap.appendChild(body);
  makeCollapsible(id, btn, body);
  return { cap, body };
}

function syncAllBtn() {
  const all = wireCap.cap.__allBtn;
  if (!all) return;
  const anyClosed = [...collapsibles.keys()]
    .some(k => (k.startsWith('role:') || k.startsWith('screen:')) && !isOpen(k));
  all.textContent = anyClosed ? 'розгорнути все' : 'згорнути все';
}

// Ресерч і документи
const resCap = capSection('cap:research', 'Ресерч і документи', false);
for (const [f, t] of RESEARCH) {
  const a = document.createElement('a');
  a.className = 'pg';
  a.href = '#' + f;
  a.dataset.f = f;
  a.textContent = t;
  resCap.body.appendChild(a);
  navItems.set(f, { pg: a, ancestors: ['cap:research'] });
  filterables.push({ el: a, text: (t + ' ' + f).toLowerCase(), ids: ['cap:research'] });
}
frag.appendChild(resCap.cap);

// Вайрфрейми: роль → екран → стан
const wireCap = capSection('cap:wire', 'Вайрфрейми', true);

const hub = document.createElement('a');
hub.className = 'pg';
hub.href = '#wireframes/index.html';
hub.dataset.f = 'wireframes/index.html';
hub.textContent = 'Огляд вайрфреймів';
wireCap.body.appendChild(hub);
navItems.set('wireframes/index.html', { pg: hub, ancestors: ['cap:wire'] });
filterables.push({ el: hub, text: 'огляд вайрфреймів wireframes/index.html', ids: ['cap:wire'] });

ROLES.forEach((r, ri) => {
  const roleId = 'role:' + ri;
  const roleEl = document.createElement('div');
  roleEl.className = 'role';
  const rBtn = document.createElement('button');
  rBtn.className = 'role-btn';
  rBtn.type = 'button';
  rBtn.innerHTML = CHEV + r.role + `<span class="cnt">${r.screens.length}</span>`;
  const rBody = document.createElement('div');
  rBody.className = 'role-body';
  roleEl.appendChild(rBtn);
  roleEl.appendChild(rBody);
  makeCollapsible(roleId, rBtn, rBody);

  for (const s of r.screens) {
    const mainFile = 'wireframes/' + s.states[0][0];
    const screenId = 'screen:' + mainFile;
    const scr = document.createElement('div');
    scr.className = 'screen';

    const row = document.createElement('div');
    row.className = 'scr-row';

    const tw = document.createElement('button');
    tw.className = 'tw';
    tw.type = 'button';
    tw.innerHTML = CHEV;
    tw.setAttribute('aria-label', 'Стани екрана «' + s.t + '»');
    row.appendChild(tw);

    const a = document.createElement('a');
    a.className = 'pg';
    a.href = '#' + mainFile;
    a.dataset.f = mainFile;
    a.textContent = s.t;
    row.appendChild(a);

    if (s.tag) {
      const [label, href, title] = s.tag;
      const tag = document.createElement('a');
      tag.className = 'tag';
      const [tf, th] = href.split('#');
      tag.href = '#' + tf;
      tag.dataset.f = tf;
      tag.dataset.h = th ? '#' + th : '';
      tag.title = title;
      tag.textContent = label;
      row.appendChild(tag);
    }
    scr.appendChild(row);

    const states = document.createElement('div');
    states.className = 'states';
    let text = (s.t + ' ' + mainFile + ' ' + (s.tag ? s.tag[0] + ' ' + s.tag[2] : '')).toLowerCase();
    for (const [sf, sl] of s.states) {
      const file = 'wireframes/' + sf;
      const st = document.createElement('a');
      st.className = 'st';
      st.href = '#' + file;
      st.dataset.f = file;
      st.textContent = sl;
      states.appendChild(st);
      text += ' ' + (sl + ' ' + file).toLowerCase();
      navItems.set(file, { pg: st, ancestors: ['cap:wire', roleId, screenId] });
    }
    scr.appendChild(states);
    navItems.get(mainFile).pg = a; // головний стан підсвічуємо на рядку екрана теж

    if (s.states.length > 1) {
      makeCollapsible(screenId, tw, states);
    } else {
      tw.classList.add('void');
      tw.tabIndex = -1;
      states.hidden = true;
    }

    filterables.push({ el: scr, text, ids: ['cap:wire', roleId, screenId], statesEl: states });
    rBody.appendChild(scr);
  }
  wireCap.body.appendChild(roleEl);
  filterables.push({ el: roleEl, text: r.role.toLowerCase(), ids: ['cap:wire', 'role:' + ri], isRole: true, roleId });
});
frag.appendChild(wireCap.cap);

const nomatch = document.createElement('p');
nomatch.className = 'nomatch';
nomatch.textContent = 'Нічого не знайдено. Спробуйте коротший запит.';
frag.appendChild(nomatch);

nav.appendChild(frag);
syncAllBtn();

// повний перелік дозволених файлів — і навігація, і захист від крафтових hash
const ALL_FILES = new Set(
  [...nav.querySelectorAll('[data-f]')].map(el => el.dataset.f));

// ── фільтр ──
function applyFilter() {
  const q = filterEl.value.trim().toLowerCase();
  if (!q) {
    for (const it of filterables) it.el.hidden = false;
    for (const id of collapsibles.keys()) applyOpen(id, openState[id]);
    revealActive(false);
    nomatch.style.display = 'none';
    resCap.cap.hidden = wireCap.cap.hidden = false;
    nav.querySelectorAll('.secs').forEach(s => { s.hidden = false; });
    return;
  }
  let hits = 0;
  const liveRoles = new Set();
  for (const it of filterables) {
    if (it.isRole) continue;
    const hit = it.text.includes(q);
    it.el.hidden = !hit;
    if (hit) {
      hits++;
      for (const id of it.ids) {
        if (id.startsWith('role:')) liveRoles.add(id);
        applyOpen(id, true);
      }
    }
  }
  nav.querySelectorAll('.secs').forEach(s => {
    s.hidden = !!s.previousElementSibling && s.previousElementSibling.hidden;
  });
  for (const it of filterables) {
    if (!it.isRole) continue;
    const roleHit = it.text.includes(q);
    it.el.hidden = !roleHit && !liveRoles.has(it.roleId);
    if (roleHit) {
      for (const id of it.ids) applyOpen(id, true);
      const c = collapsibles.get(it.roleId);
      if (c) for (const child of c.body.querySelectorAll('.screen')) child.hidden = false;
      hits++;
    }
  }
  resCap.cap.hidden = ![...resCap.body.children].some(el => !el.hidden);
  wireCap.cap.hidden = ![...wireCap.body.children].some(el => !el.hidden);
  nomatch.style.display = hits ? 'none' : 'block';
}
filterEl.addEventListener('input', applyFilter);
filterEl.addEventListener('keydown', e => {
  if (e.key === 'Escape') { filterEl.value = ''; applyFilter(); filterEl.blur(); }
});
function isTyping(el) {
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
}
document.addEventListener('keydown', e => {
  if (e.key === '/' && !isTyping(document.activeElement)) {
    e.preventDefault();
    filterEl.focus();
  }
});

// ── навігація ──
let pendingHash = '';
let targetFile = null; // куди оболонка веде iframe (під час завантаження ≠ поточному документу)

// оболонка може жити не в корені сервера — шляхи рахуємо від її теки
const BASE = location.pathname.replace(/[^/]*$/, '');
function toFile(pathname) {
  return pathname.startsWith(BASE) ? pathname.slice(BASE.length) : pathname.replace(/^\//, '');
}

function currentFile() {
  try { return toFile(frame.contentWindow.location.pathname); }
  catch (_) { return null; }
}

function revealActive(scroll = true) {
  const file = openEl.dataset.f;
  const item = navItems.get(file);
  if (!item) return;
  for (const id of item.ancestors) applyOpen(id, true); // показ, не намір
  if (scroll) {
    const act = nav.querySelector('.pg.active, .st.active');
    if (act) act.scrollIntoView({ block: 'nearest' });
  }
}

function show(file, push = true) {
  const cur = currentFile();
  const inFlight = targetFile !== null && targetFile !== cur;
  if (targetFile !== file) pendingHash = ''; // новий перехід скасовує чужий якір
  targetFile = file;
  if (cur !== file) {
    frame.src = file;
  } else if (inFlight) {
    // документ уже правильний, але в польоті чужа навігація — скасувати
    try { frame.contentWindow.stop(); } catch (_) {}
  }
  pathEl.textContent = '/' + file;
  openEl.href = file;
  openEl.dataset.f = file;
  for (const el of nav.querySelectorAll('[data-f]'))
    el.classList.toggle('active', el.dataset.f === file && el !== brand && !el.classList.contains('tag'));
  if (push && location.hash !== '#' + file)
    history.replaceState(null, '', '#' + file);
  revealActive();
  syncAllBtn();
}

function goto(file, hash) {
  if (hash && file === currentFile() && targetFile === file) {
    try { frame.contentWindow.location.hash = hash; } catch (_) {}
    show(file);
    return;
  }
  show(file);            // спершу перехід: він скидає чужий pendingHash…
  pendingHash = hash || ''; // …а тоді ставимо свій якір
}

nav.addEventListener('click', e => {
  const tag = e.target.closest('.tag');
  if (tag) {
    e.preventDefault();
    goto(tag.dataset.f, tag.dataset.h);
    return;
  }
  const a = e.target.closest('a[data-f]');
  if (!a) return;
  e.preventDefault();
  show(a.dataset.f);
});

// ── секції активної research-сторінки: підтягуємо з її прихованого сайдбара ──
let secsObserver = null;

function buildSecs(doc, file) {
  nav.querySelectorAll('.secs').forEach(el => el.remove());
  if (secsObserver) { secsObserver.disconnect(); secsObserver = null; }
  if (!doc) return;

  const inner = [...doc.querySelectorAll('.sidenav .nav-links a[href^="#"]')];
  const item = navItems.get(file);
  if (!inner.length || !item || !file.startsWith('research/')) return;

  const box = document.createElement('div');
  box.className = 'secs';
  const mirror = new Map();
  for (const l of inner) {
    const a = document.createElement('a');
    const href = l.getAttribute('href');
    a.href = href;
    const numEl = l.querySelector('.n');
    if (numEl) {
      const n = document.createElement('span');
      n.className = 'n';
      n.textContent = numEl.textContent;
      a.appendChild(n);
      a.appendChild(document.createTextNode(
        l.textContent.replace(numEl.textContent, '').trim()));
    } else {
      a.textContent = l.textContent.trim();
    }
    box.appendChild(a);
    mirror.set(href, a);
  }
  item.pg.insertAdjacentElement('afterend', box);

  box.addEventListener('click', e => {
    const a = e.target.closest('a');
    if (!a) return;
    e.preventDefault();
    const href = a.getAttribute('href');
    try {
      const win = frame.contentWindow;
      if (win.location.hash === href) {
        const t = win.document.querySelector(href);
        if (t) t.scrollIntoView({ block: 'start' });
      } else {
        win.location.hash = href;
      }
    } catch (_) {}
  });

  // скролспай сторінки продовжує працювати у прихованому сайдбарі — віддзеркалюємо
  const sync = () => {
    for (const l of inner) {
      const mine = mirror.get(l.getAttribute('href'));
      if (mine) mine.classList.toggle('active', l.classList.contains('active'));
    }
  };
  secsObserver = new MutationObserver(sync);
  for (const l of inner)
    secsObserver.observe(l, { attributes: true, attributeFilter: ['class'] });
  sync();
}

// ── завантаження сторінки в iframe ──
frame.addEventListener('load', () => {
  const file = currentFile();
  if (!file) {
    // недоступний/чужий документ — просто показуємо як є, не лишаємо порожнечу
    frame.classList.add('ready');
    return;
  }
  targetFile = file; // реальність перемогла (back/forward, програна гонка)
  const doc = frame.contentDocument;

  // ховаємо власний сайдбар сторінки — панель у проєкті одна
  if (doc && doc.querySelector('.sidenav, .wf-nav') && !doc.getElementById('shell-css')) {
    const st = doc.createElement('style');
    st.id = 'shell-css';
    st.textContent =
      '.sidenav{display:none!important}' +
      '.shell{grid-template-columns:minmax(0,1fr)!important;gap:0!important}' +
      '.wf-nav{display:none!important}';
    doc.head.appendChild(st);
  }

  // внутрішні переходи між сторінками ведемо через оболонку
  if (doc && !doc.__shellHooked) {
    doc.__shellHooked = true;
    doc.addEventListener('click', e => {
      const a = e.target.closest('a[href]');
      if (!a) return;
      const href = a.getAttribute('href') || '';
      if (href.startsWith('#')) return; // якорі лишаємо самій сторінці
      const url = new URL(a.href, doc.baseURI);
      const sameOrigin = url.origin === location.origin;
      if (sameOrigin && /\.html$/.test(url.pathname) && a.target !== '_blank') {
        // переходи між сторінками проєкту ведемо через оболонку
        e.preventDefault();
        goto(toFile(url.pathname), url.hash);
      } else if (url.protocol === 'http:' || url.protocol === 'https:') {
        // зовнішні сайти і сирі .md — у нову вкладку, iframe не чіпаємо
        e.preventDefault();
        window.open(url.href, '_blank', 'noopener');
      }
    });
    doc.addEventListener('keydown', e => {
      if (e.key === '/' && !isTyping(e.target)) {
        e.preventDefault();
        filterEl.focus();
      }
    });
    frame.contentWindow.addEventListener('pagehide', () => {
      frame.classList.remove('ready');
      setTimeout(() => frame.classList.add('ready'), 2500); // запобіжник
    });
  }

  show(file);
  buildSecs(doc, file);

  if (pendingHash) {
    try { frame.contentWindow.location.hash = pendingHash; } catch (_) {}
    pendingHash = '';
  }
  frame.classList.add('ready');
});

// ── старт: hash або головна (тільки файли з переліку — жодних javascript:/зовнішніх URL) ──
function fromHash() {
  const f = decodeURIComponent(location.hash.slice(1));
  return ALL_FILES.has(f) ? f : HOME;
}
show(fromHash(), false);
window.addEventListener('hashchange', () => show(fromHash()));
</script>
